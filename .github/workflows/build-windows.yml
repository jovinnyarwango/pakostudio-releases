name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. 5.1.0)'
        required: true
        default: '5.1.0'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout PAKOStudio source
        uses: actions/checkout@v4
        with:
          repository: jovinnyarwango/pakostudio-web
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          path: source

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyinstaller
          pip install opencv-contrib-python Pillow numpy rawpy pyexiftool
          pip install PySide6
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install onnxruntime insightface mediapipe
          pip install git+https://github.com/openai/CLIP.git piq glasses-detector ultralytics psutil requests
        shell: cmd

      # Provisions EVERY model the spec bundles, so the Windows build
      # matches the macOS build and users never download models at runtime.
      # Each section ASSERTS success — a build with missing models fails
      # loudly here instead of shipping a silently broken ZIP.
      - name: Download ML models
        shell: python
        run: |
          import urllib.request, zipfile, os, shutil

          # ── InsightFace buffalo_l (341MB) ───────────────────────────────
          # The old step only created an empty folder; the spec found no
          # .onnx files and bundled nothing, so every Windows user
          # downloaded these at first analysis.
          insightface_dir = os.path.expanduser('~/.insightface/models/buffalo_l')
          os.makedirs(insightface_dir, exist_ok=True)
          url = ('https://github.com/deepinsight/insightface/releases/'
                 'download/v0.7/buffalo_l.zip')
          zip_path = 'buffalo_l.zip'
          print('Downloading buffalo_l...')
          urllib.request.urlretrieve(url, zip_path)
          with zipfile.ZipFile(zip_path) as z:
              # Zip may contain a buffalo_l/ folder or bare files —
              # flatten every .onnx directly into the target dir.
              for member in z.namelist():
                  if member.endswith('.onnx'):
                      target = os.path.join(insightface_dir,
                                            os.path.basename(member))
                      with z.open(member) as src, open(target, 'wb') as dst:
                          shutil.copyfileobj(src, dst)
                      print(f'  extracted {os.path.basename(member)}')
          onnx_count = len([f for f in os.listdir(insightface_dir)
                            if f.endswith('.onnx')])
          print(f'InsightFace ready — {onnx_count} onnx files')
          assert onnx_count >= 5, 'buffalo_l incomplete!'

          # ── CLIP ViT-B/32 (354MB) — downloads into ~/.cache/clip ───────
          import clip
          clip.load('ViT-B/32', device='cpu')
          clip_dir = os.path.expanduser('~/.cache/clip')
          assert any(f.endswith('.pt') for f in os.listdir(clip_dir)), \
              'CLIP cache empty!'
          print('CLIP ready')

          # ── YOLOv8n (6MB) ───────────────────────────────────────────────
          from ultralytics import YOLO
          YOLO('yolov8n.pt')
          if os.path.exists('yolov8n.pt'):
              shutil.copy('yolov8n.pt', os.path.join('source', 'yolov8n.pt'))
          assert os.path.exists(os.path.join('source', 'yolov8n.pt')), \
              'yolov8n.pt missing from source!'
          print('YOLOv8n ready')

          # ── MediaPipe face landmarker (3.7MB) ───────────────────────────
          url = ('https://storage.googleapis.com/mediapipe-models/'
                 'face_landmarker/face_landmarker/float16/1/'
                 'face_landmarker.task')
          urllib.request.urlretrieve(
              url, os.path.join('source', 'face_landmarker.task'))
          print('MediaPipe face_landmarker ready')

          # ── Verify repo-committed model files are present ───────────────
          # These small files are COMMITTED to pakostudio-web:
          #   aesthetic_head.pth, blaze_face_short_range.task,
          #   face_detection_yunet_2023mar.onnx,
          #   face_recognition_sface_2021dec.onnx, config.json
          # The spec silently skips missing files — fail loudly instead.
          required = [
              'aesthetic_head.pth',
              'blaze_face_short_range.task',
              'face_detection_yunet_2023mar.onnx',
              'face_recognition_sface_2021dec.onnx',
              'config.json',
          ]
          missing = [f for f in required
                     if not os.path.exists(os.path.join('source', f))]
          if missing:
              raise SystemExit(
                  f'MISSING from pakostudio-web repo: {missing} — '
                  f'commit these files, the build would silently omit them.')
          print('All models ready')

      - name: Build EXE with PyInstaller
        run: pyinstaller PAKOStudio.spec --clean --noconfirm
        shell: cmd
        working-directory: source

      - name: Package as ZIP
        shell: powershell
        run: |
          $version = "${{ github.event.inputs.version }}"
          Compress-Archive -Path "source\dist\PAKOStudio\*" -DestinationPath "PAKOStudio-${version}-windows-x64.zip"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: PAKOStudio-*.zip
          tag_name: v${{ github.event.inputs.version }}-win
          name: PAKOStudio ${{ github.event.inputs.version }} (Windows)
          body: |
            Windows build of PAKOStudio ${{ github.event.inputs.version }}

            - Extract the ZIP and run PAKOStudio.exe
            - Register at https://pakostudio-web.vercel.app/register
            - Windows SmartScreen warning: click More info then Run anyway
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. 5.1.0)'
        required: true
        default: '5.1.0'

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout PAKOStudio source
        uses: actions/checkout@v4
        with:
          repository: jovinnyarwango/pakostudio-web
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          path: source

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install opencv-contrib-python Pillow numpy rawpy pyexiftool
          pip install PySide6
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install onnxruntime insightface mediapipe
          pip install openai-clip piq glasses-detector ultralytics psutil requests
        shell: cmd

      - name: Download ML models
        run: |
          python -c "
          import urllib.request, os, sys
          os.makedirs(os.path.expanduser('~/.insightface/models/buffalo_l'), exist_ok=True)
          import clip
          clip.load('ViT-B/32', device='cpu')
          from ultralytics import YOLO
          YOLO('yolov8n.pt')
          url = 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task'
          urllib.request.urlretrieve(url, 'face_landmarker.task')
          print('Models ready')
          "
        shell: cmd
        working-directory: source

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller PAKOStudio.spec --clean --noconfirm
        shell: cmd
        working-directory: source

      - name: Package as ZIP
        run: |
          $version = "${{ github.event.inputs.version }}"
          Compress-Archive -Path "source\dist\PAKOStudio\*" -DestinationPath "PAKOStudio-${version}-windows-x64.zip"
        shell: powershell

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: PAKOStudio-*.zip
          tag_name: v${{ github.event.inputs.version }}-win
          name: PAKOStudio ${{ github.event.inputs.version }} (Windows)
          body: |
            Windows build of PAKOStudio ${{ github.event.inputs.version }}
            
            - Extract the ZIP and run PAKOStudio.exe
            - Register at https://pakostudio-web.vercel.app/register
            - Windows SmartScreen warning: click More info → Run anyway
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
